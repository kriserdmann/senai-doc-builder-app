<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} | SENAI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="dashboard" data-id="dashboard">
  <!-- Sidebar Navigation -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="images/logo-senai.png" alt="SENAI" class="sidebar-logo">
    </div>
    <nav class="sidebar-menu" id="sidebar-menu">
      <!-- Injetado via app.js -->
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="hero">
      {{#if duration}}
      <span class="status-pill">{{duration}}</span>
      {{/if}}
      <h1>{{title}}</h1>
      <p>{{description}}</p>
    </header>

    <div class="content-body">
      {{content}}
    </div>

  </main>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
