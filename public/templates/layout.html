<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} | SENAI</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
</head>
<body data-page="lesson" data-id="{{id}}">
  <!-- Sidebar Navigation -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="images/logo-senai.png" alt="SENAI" class="sidebar-logo">
    </div>
    <nav class="sidebar-menu" id="sidebar-menu">
      <!-- Injetado via app.js -->
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="hero">
      {{#if duration}}
      <span class="status-pill">{{duration}}</span>
      {{/if}}
      <h1>{{title}}</h1>
      {{#if description}}
      <p>{{description}}</p>
      {{/if}}
    </header>
    <div class="content-body">
      {{content}}
    </div>
    <div class="progress-section" style="margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border-color);">
      <label style="display: flex; align-items: center; gap: 8px; font-weight: bold; cursor: pointer;">
        <input type="checkbox" id="mark-completed" data-id="{{id}}" style="width: 20px; height: 20px;">
        Marcar como concluído
      </label>
    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
